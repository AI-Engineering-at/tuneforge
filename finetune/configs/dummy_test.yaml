base_model: Qwen/Qwen2.5-0.5B
output_dir: output/dummy_test
backend: peft_trl
dataset_path: datasets/dummy_test.jsonl
dataset_format: alpaca
primary_metric: train_loss
metric_goal: minimize
lora_r: 8
lora_alpha: 16
lora_dropout: 0.1
bits: 4
learning_rate: 2e-4
max_steps: 2
per_device_train_batch_size: 2
gradient_accumulation_steps: 1
max_seq_length: 128
logging_steps: 1
save_steps: 2
eval_steps: 2
